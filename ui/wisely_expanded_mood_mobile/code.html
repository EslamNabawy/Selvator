<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#ff75a2",
                    "on-tertiary": "#ffeff1",

                    "inverse-surface": "#0c0f10",

                    "on-secondary": "#bffff7",
                    "secondary-dim": "#005a54",
                    "on-error": "#ffefef",
                    "on-error-container": "#510017",
                    "surface-dim": "#d1d5d7",
                    "surface-container-high": "#e0e3e4",
                    "on-tertiary-fixed": "#380017",
                    "on-secondary-container": "#00534d",
                    "on-secondary-fixed": "#003e39",
                    "background": "#f5f6f7",
                    "outline-variant": "#abadae",
                    "surface-container-highest": "#dadddf",
                    "error": "#b41340",
                    "tertiary-container": "#ff8eaf",
                    "on-primary": "#fff0e2",
                    "on-background": "#2c2f30",
                    "on-secondary-fixed-variant": "#005d57",
                    "inverse-on-surface": "#9b9d9e",
                    "primary": "#7f5200",
                    "on-surface-variant": "#595c5d",
                    "secondary-fixed": "#7fe6db",
                    "secondary-container": "#7fe6db",
                    "surface": "#f5f6f7",
                    "on-tertiary-fixed-variant": "#760038",
                    "tertiary-fixed": "#ff8eaf",
                    "secondary": "#006760",
                    "on-tertiary-container": "#66002f",
                    "outline": "#757778",
                    "on-surface": "#2c2f30",
                    "primary-container": "#feb64c",
                    "error-dim": "#a70138",
                    "on-primary-container": "#583700",
                    "surface-variant": "#dadddf",
                    "on-primary-fixed-variant": "#644000",
                    "inverse-primary": "#feb64c",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#eff1f2",
                    "tertiary-dim": "#971b4e",
                    "primary-fixed": "#feb64c",
                    "surface-container": "#e6e8ea",
                    "surface-bright": "#f5f6f7"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .organic-blob {
            border-radius: 43% 57% 70% 30% / 30% 45% 55% 70%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl shadow-[0_10px_40px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-indigo-700 dark:text-indigo-300" data-icon="bubble_chart">bubble_chart</span>
<h1 class="text-2xl font-bold text-indigo-800 dark:text-indigo-200 font-jakarta tracking-tight">Wisely</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined text-indigo-700 dark:text-indigo-300" data-icon="settings">settings</span>
</button>
</header>
<main class="pt-24 px-6 relative overflow-hidden">
<!-- The Blob Character (Happy State) -->
<div class="absolute -top-10 -right-20 w-80 h-80 bg-primary-container/40 blur-3xl rounded-full mix-blend-multiply"></div>
<div class="relative z-10 flex flex-col items-center mb-12">
<div class="w-48 h-56 bg-primary-container organic-blob relative flex items-center justify-center transition-all duration-700 hover:scale-105 group shadow-[0_20px_50px_rgba(127,82,0,0.2)]">
<!-- Eye features -->
<div class="flex gap-4 mb-8">
<div class="w-4 h-4 bg-on-primary-container rounded-full group-hover:scale-y-125 transition-transform"></div>
<div class="w-4 h-4 bg-on-primary-container rounded-full group-hover:scale-y-125 transition-transform"></div>
</div>
<!-- Mouth feature -->
<div class="absolute bottom-16 w-12 h-6 border-b-4 border-on-primary-container rounded-full"></div>
<!-- Floating Elements -->
<div class="absolute -top-4 -left-4 w-12 h-12 bg-white/40 backdrop-blur-md rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
</div>
<div class="mt-8 text-center space-y-2">
<h2 class="text-3xl font-jakarta font-bold text-on-surface tracking-tight">Bright and bold!</h2>
<p class="text-on-surface-variant font-body">How are we feeling right now?</p>
</div>
</div>
<!-- Mood Selector Section -->
<section class="space-y-6">
<div class="flex flex-wrap gap-3 justify-center">
<!-- Happy Chip (Active/Expanded) -->
<div class="flex flex-col items-center gap-3 w-full">
<button class="bg-primary-container text-on-primary-container px-8 py-4 rounded-xl font-jakarta font-bold text-lg flex items-center gap-2 shadow-xl border-none">
<span class="material-symbols-outlined" data-icon="sentiment_very_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
                        Happy
                    </button>
<!-- Sub-moods (Nested Chips) -->
<div class="flex gap-2 animate-in fade-in slide-in-from-top-2 duration-500">
<button class="bg-primary-container/40 text-on-primary-container px-5 py-2 rounded-full text-sm font-semibold hover:bg-primary-container/60 transition-colors">
                            Confident
                        </button>
<button class="bg-primary-container/40 text-on-primary-container px-5 py-2 rounded-full text-sm font-semibold hover:bg-primary-container/60 transition-colors">
                            Grateful
                        </button>
</div>
</div>
<!-- Inactive Moods -->
<div class="flex gap-3 mt-2 overflow-x-auto pb-2 no-scrollbar w-full justify-center">
<button class="bg-surface-container-low text-on-surface-variant px-6 py-3 rounded-xl font-medium flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="self_improvement">self_improvement</span>
                        Calm
                    </button>
<button class="bg-surface-container-low text-on-surface-variant px-6 py-3 rounded-xl font-medium flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
                        Love
                    </button>
</div>
</div>
</section>
<!-- Mood Insights Card -->
<section class="mt-12 mb-24">
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_10px_40px_rgba(0,0,0,0.03)] relative overflow-hidden border border-outline-variant/10">
<div class="flex justify-between items-start mb-6">
<div>
<h3 class="text-xl font-jakarta font-bold text-on-surface">Mood Insights</h3>
<p class="text-sm text-on-surface-variant">Your energy is peaking today</p>
</div>
<div class="p-2 bg-primary/10 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="insights">insights</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-4 rounded-xl">
<span class="text-label-md text-on-surface-variant uppercase tracking-widest text-[10px] font-bold block mb-1">Focus Level</span>
<span class="text-2xl font-jakarta font-bold text-primary">88%</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl">
<span class="text-label-md text-on-surface-variant uppercase tracking-widest text-[10px] font-bold block mb-1">Vitality</span>
<span class="text-2xl font-jakarta font-bold text-secondary">High</span>
</div>
</div>
<div class="mt-6 flex items-center gap-4 p-4 bg-primary-container/10 rounded-xl">
<img alt="Morning Yoga" class="w-12 h-12 rounded-full object-cover" data-alt="peaceful woman practicing yoga in a sunlit room with warm morning light filtering through linen curtains" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBisnYUI7edk4S0-ICQv7sWM85j3BJVLjkSdgg_1cwEF0weT1uhXh_TPl4Bp_qIhlltKs86IsvY1va4vbzJGbpZNsSZUaIRPv3NIpZHRYTLrT72lCnpcEaRMRFeYCv29NqYmTV8jDomUQx_dP2a6284XgZwXKLsag844RfBwUxzClThofFcVuCucaZRgab34YLpUJASu5a9hAAjSafHIEdbeP11HMsv0Gb-GwPBdwNrZtonL2fappY8fu6bb-NIHcGM3WHfE6lhQOSd"/>
<div class="flex-1">
<p class="text-xs font-bold text-primary uppercase tracking-tighter">Recommended Activity</p>
<p class="text-sm font-semibold text-on-surface">Sun Salutation Flow</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/60 dark:bg-slate-900/60 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(92,107,192,0.1)] rounded-t-[3rem]">
<div class="flex flex-col items-center justify-center bg-indigo-100 dark:bg-indigo-900/40 text-indigo-800 dark:text-indigo-100 rounded-full px-5 py-2 transition-all scale-110 duration-500 cursor-pointer">
<span class="material-symbols-outlined" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Sanctuary</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 rounded-full cursor-pointer">
<span class="material-symbols-outlined" data-icon="self_improvement">self_improvement</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Reflect</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 rounded-full cursor-pointer">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Explore</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 rounded-full cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider mt-1">Profile</span>
</div>
</nav>
</body></html>
