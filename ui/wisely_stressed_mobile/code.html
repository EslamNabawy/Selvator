<path class="jitter-path" d="M20,50 C20,20 80,20 80,50 C80,80 20,80 20,50" fill="none" stroke="#00534d" stroke-width="2"></path>
<path d="M30,40 C35,35 45,35 50,40 C55,45 65,45 70,40" fill="none" stroke="#00534d" stroke-width="1.5"></path>
</svg>

</div>
</div>
<!-- Subtle Tonal Glow -->
<div class="absolute inset-0 bg-gradient-to-tr from-secondary/20 to-transparent rounded-full pointer-events-none"></div>
</div>

<div class="absolute -top-4 -right-2 text-secondary/40 select-none">
<span class="material-symbols-outlined text-4xl" data-icon="air">air</span>
</div>
</div>
<!-- Translucent Glass Quote Card -->
<div class="relative z-10 w-full max-w-md bg-white/40 backdrop-blur-3xl rounded-xl p-10 flex flex-col items-center text-center shadow-[0_20px_60px_rgba(0,0,0,0.08)] border border-white/40">

<div class="mb-8 flex flex-col items-center gap-2">
<span class="bg-secondary-container text-on-secondary-container px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] font-label">Stressed</span>
<div class="w-8 h-1 bg-secondary-container/40 rounded-full"></div>
</div>
<!-- The Quote -->
<h1 class="font-headline text-[2rem] leading-tight font-bold text-on-surface mb-6 tracking-tight">
                Take a deep breath. <br/>
<span class="text-secondary italic font-medium">This too shall pass.</span>
</h1>
<p class="font-body text-on-surface-variant text-base mb-10 max-w-[280px] leading-relaxed">
                Allow the weight of the day to dissipate with each exhale. You are safe in this sanctuary.
            </p>
<!-- Primary Action Button -->
<button class="w-full bg-gradient-to-r from-secondary to-secondary-dim text-on-secondary py-5 px-8 rounded-xl font-headline font-bold text-lg hover:opacity-90 active:scale-95 transition-all duration-300 shadow-xl shadow-secondary/20 flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="self_improvement">self_improvement</span>

            </button>

<div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-secondary-container rounded-full blur-[80px] opacity-40"></div>
